<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Website Builder</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        #preview { border: 1px solid #ccc; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Text-to-Website Tool</h2>
    <input type="text" id="siteTitle" placeholder="Website Title (SEO Title)">
    <textarea id="siteContent" placeholder="Enter your content here..."></textarea>
    <input type="text" id="adId" placeholder="Google AdSense Ad Unit ID">
    <button onclick="generateSite()">Generate Preview</button>

    <div id="preview"></div>

    <script>
        function generateSite() {
            const title = document.getElementById('siteTitle').value;
            const content = document.getElementById('siteContent').value;
            const adId = document.getElementById('adId').value;

            const htmlTemplate = `
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <meta name="description" content="${content.substring(0, 150)}">
                    <title>${title}</title>
                    <style>body { font-family: Arial; padding: 20px; }</style>
                </head>
                <body>
                    <h1>${title}</h1>
                    <article>${content}</article>
                    
                    <div class="ad-container" style="margin: 20px 0;">
                        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"><\/script>
                        <ins class="adsbygoogle"
                             style="display:block"
                             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                             data-ad-slot="${adId}"
                             data-ad-format="auto"></ins>
